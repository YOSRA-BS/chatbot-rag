# =============================================================================
# pytest.ini — Configuration for the RAG chatbot test suite
#
# Configures pytest behavior, markers, and test discovery for the project.
# =============================================================================

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    slow: Slow-running tests (e.g., with real embeddings)
    requires_ollama: Tests that require Ollama to be running
    requires_gpu: Tests that require GPU for embeddings

# Test execution
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    -v

# Coverage configuration
# addopts =
#     --cov=.
#     --cov-report=html
#     --cov-report=term-missing
#     --cov-fail-under=80

# Fixtures
